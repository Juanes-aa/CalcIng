name: CI CalcIng

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — typecheck + vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend
      - name: TypeScript typecheck
        run: npx tsc --noEmit
        working-directory: ./frontend
      - name: Run vitest
        run: npx vitest run
        working-directory: ./frontend

  backend:
    name: Backend — pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: services/math-engine/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: ./services/math-engine
      - name: Run pytest
        run: pytest --tb=short -q
        working-directory: ./services/math-engine