<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-fixed": "#6bff8f",
              "on-surface-variant": "#c3c6d7",
              "secondary-fixed-dim": "#4ae176",
              "surface-container-high": "#282a30",
              "inverse-primary": "#0053db",
              "surface-container-lowest": "#0c0e14",
              "surface": "#111319",
              "on-tertiary-container": "#ffecea",
              "tertiary-fixed-dim": "#ffb3ad",
              "on-primary-fixed": "#00174b",
              "surface-dim": "#111319",
              "surface-container": "#1e1f26",
              "primary": "#b4c5ff",
              "secondary-container": "#00b954",
              "on-tertiary-fixed": "#410004",
              "on-surface": "#e2e2eb",
              "surface-container-highest": "#33343b",
              "surface-container-low": "#191b22",
              "tertiary-fixed": "#ffdad7",
              "surface-bright": "#373940",
              "tertiary": "#ffb3ad",
              "inverse-on-surface": "#2e3037",
              "background": "#111319",
              "on-primary-container": "#eeefff",
              "outline": "#8d90a0",
              "on-secondary": "#003915",
              "outline-variant": "#434655",
              "primary-fixed-dim": "#b4c5ff",
              "secondary": "#4ae176",
              "primary-fixed": "#dbe1ff",
              "on-secondary-fixed": "#002109",
              "surface-tint": "#b4c5ff",
              "on-background": "#e2e2eb",
              "on-primary-fixed-variant": "#003ea8",
              "surface-variant": "#33343b",
              "primary-container": "#2563eb",
              "tertiary-container": "#cf2c30",
              "on-error": "#690005",
              "error": "#ffb4ab",
              "on-primary": "#002a78",
              "on-error-container": "#ffdad6",
              "error-container": "#93000a",
              "on-secondary-container": "#004119",
              "on-tertiary-fixed-variant": "#930013",
              "on-tertiary": "#68000a",
              "on-secondary-fixed-variant": "#005321",
              "inverse-surface": "#e2e2eb"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Inter"],
              "label": ["Inter"],
              "mono": ["JetBrains Mono"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container overflow-hidden">
<!-- Top Navigation Anchor (As specified in JSON) -->
<header class="bg-[#111319] dark:bg-[#111319] border-b border-white/10 docked full-width top-0 z-50 flex justify-between items-center w-full px-6 h-16">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-slate-400">close</span>
<h1 class="text-xl font-bold tracking-tighter text-blue-500 dark:text-blue-400 font-headline">NUEVO PROYECTO</h1>
</div>
<div class="flex gap-4">
<span class="material-symbols-outlined text-slate-400 hover:bg-white/5 transition-colors p-2 rounded-full">help_outline</span>
</div>
</header>
<!-- Main Content Canvas (Focused Task Flow) -->
<main class="h-[calc(100vh-128px)] overflow-y-auto no-scrollbar px-6 pt-8 pb-32">
<div class="max-w-md mx-auto space-y-8">
<!-- Identification Section -->
<section class="space-y-6">
<div>
<label class="font-headline uppercase tracking-widest text-[10px] text-slate-500 mb-2 block">Identificación del Proyecto</label>
<div class="space-y-4">
<div class="relative">
<input class="w-full bg-surface-container-lowest border-0 border-b border-white/10 focus:border-blue-500 focus:ring-0 text-lg font-headline placeholder:text-slate-600 py-3 transition-all duration-300" placeholder="Nombre del proyecto" type="text"/>
</div>
<div class="relative">
<textarea class="w-full bg-surface-container-lowest border-0 border-b border-white/10 focus:border-blue-500 focus:ring-0 text-sm font-body placeholder:text-slate-600 py-3 resize-none transition-all duration-300" placeholder="Descripción técnica" rows="3"></textarea>
</div>
</div>
</div>
<!-- Project Type Selection (Asymmetric Chips) -->
<div>
<label class="font-headline uppercase tracking-widest text-[10px] text-slate-500 mb-4 block">Tipo de Cálculo</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 bg-blue-500/10 border border-blue-500/30 text-blue-400 rounded-lg text-xs font-medium transition-all active:scale-95">
                            DINÁMICO
                        </button>
<button class="px-4 py-2 bg-surface-container-high text-slate-400 rounded-lg text-xs font-medium transition-all hover:bg-white/5">
                            ESTÁTICO
                        </button>
<button class="px-4 py-2 bg-surface-container-high text-slate-400 rounded-lg text-xs font-medium transition-all hover:bg-white/5">
                            ANALÍTICO
                        </button>
<button class="px-4 py-2 bg-surface-container-high text-slate-400 rounded-lg text-xs font-medium transition-all hover:bg-white/5">
                            EXPERIMENTAL
                        </button>
</div>
</div>
</section>
<!-- Customization Section (Visual Pickers) -->
<section class="grid grid-cols-2 gap-6">
<!-- Icon Picker -->
<div>
<label class="font-headline uppercase tracking-widest text-[10px] text-slate-500 mb-3 block">Iconografía</label>
<div class="grid grid-cols-3 gap-2 p-3 bg-surface-container-low rounded-xl">
<div class="aspect-square flex items-center justify-center bg-blue-500/20 text-blue-400 rounded-lg">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">terminal</span>
</div>
<div class="aspect-square flex items-center justify-center text-slate-600 hover:text-slate-400 transition-colors">
<span class="material-symbols-outlined">analytics</span>
</div>
<div class="aspect-square flex items-center justify-center text-slate-600 hover:text-slate-400 transition-colors">
<span class="material-symbols-outlined">science</span>
</div>
<div class="aspect-square flex items-center justify-center text-slate-600 hover:text-slate-400 transition-colors">
<span class="material-symbols-outlined">architecture</span>
</div>
<div class="aspect-square flex items-center justify-center text-slate-600 hover:text-slate-400 transition-colors">
<span class="material-symbols-outlined">memory</span>
</div>
<div class="aspect-square flex items-center justify-center text-slate-600 hover:text-slate-400 transition-colors">
<span class="material-symbols-outlined">biotech</span>
</div>
</div>
</div>
<!-- Color Picker -->
<div>
<label class="font-headline uppercase tracking-widest text-[10px] text-slate-500 mb-3 block">Espectro</label>
<div class="grid grid-cols-3 gap-2 p-3 bg-surface-container-low rounded-xl">
<div class="aspect-square rounded-full bg-blue-500 ring-2 ring-white/20 ring-offset-2 ring-offset-surface"></div>
<div class="aspect-square rounded-full bg-secondary-container opacity-40 hover:opacity-100 transition-opacity"></div>
<div class="aspect-square rounded-full bg-tertiary-container opacity-40 hover:opacity-100 transition-opacity"></div>
<div class="aspect-square rounded-full bg-purple-500 opacity-40 hover:opacity-100 transition-opacity"></div>
<div class="aspect-square rounded-full bg-amber-500 opacity-40 hover:opacity-100 transition-opacity"></div>
<div class="aspect-square rounded-full bg-slate-500 opacity-40 hover:opacity-100 transition-opacity"></div>
</div>
</div>
</section>
<!-- Visual Preview Card -->
<section class="pt-4">
<div class="p-5 bg-gradient-to-br from-surface-container to-surface-container-high rounded-xl border border-white/5 relative overflow-hidden">
<div class="absolute -right-4 -top-4 w-24 h-24 bg-blue-500/10 blur-3xl"></div>
<div class="flex items-center gap-4 relative z-10">
<div class="w-12 h-12 bg-blue-500 rounded-lg flex items-center justify-center shadow-[0_0_20px_rgba(37,99,235,0.3)]">
<span class="material-symbols-outlined text-on-primary" style="font-variation-settings: 'FILL' 1;">terminal</span>
</div>
<div>
<p class="text-xs font-headline uppercase tracking-tighter text-slate-500">Vista Previa</p>
<h3 class="font-headline text-lg font-bold">Proyecto Sin Título</h3>
</div>
</div>
</div>
</section>
</div>
</main>
<!-- Floating Action Action (Primary CTA) -->
<div class="fixed bottom-20 left-0 w-full px-6 z-40 pointer-events-none">
<button class="pointer-events-auto w-full py-4 bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold rounded-xl shadow-[0_8px_32px_rgba(0,0,0,0.5)] active:scale-95 transition-all flex items-center justify-center gap-2">
<span>CREAR PROYECTO</span>
<span class="material-symbols-outlined">add_circle</span>
</button>
</div>
<!-- Bottom Navigation Shell (As defined in JSON) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-16 pb-safe px-4 bg-[#111319]/90 backdrop-blur-xl border-t border-white/10 shadow-2xl md:hidden">
<div class="text-slate-500 flex flex-col items-center gap-1 active:bg-white/5 active:scale-90 duration-100">
<span class="material-symbols-outlined" data-icon="calculate">calculate</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase">Compute</span>
</div>
<div class="text-blue-400 flex flex-col items-center gap-1 active:bg-white/5 active:scale-90 duration-100">
<span class="material-symbols-outlined" data-icon="data_object">data_object</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase">Vars</span>
</div>
<div class="text-slate-500 flex flex-col items-center gap-1 active:bg-white/5 active:scale-90 duration-100">
<span class="material-symbols-outlined" data-icon="monitoring">monitoring</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase">Graph</span>
</div>
<div class="text-slate-500 flex flex-col items-center gap-1 active:bg-white/5 active:scale-90 duration-100">
<span class="material-symbols-outlined" data-icon="ios_share">ios_share</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase">Export</span>
</div>
</nav>
</body></html>
