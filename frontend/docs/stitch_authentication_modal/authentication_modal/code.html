<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-highest": "#33343b",
                        "outline-variant": "#434655",
                        "on-tertiary-fixed-variant": "#930013",
                        "on-secondary-fixed": "#002109",
                        "secondary-fixed-dim": "#4ae176",
                        "surface-container-low": "#191b22",
                        "on-primary-fixed-variant": "#003ea8",
                        "outline": "#8d90a0",
                        "secondary-container": "#00b954",
                        "surface-container": "#1e1f26",
                        "on-error-container": "#ffdad6",
                        "on-secondary-fixed-variant": "#005321",
                        "surface-dim": "#111319",
                        "surface-bright": "#373940",
                        "error-container": "#93000a",
                        "tertiary-fixed-dim": "#ffb3ad",
                        "surface-container-high": "#282a30",
                        "tertiary-container": "#cf2c30",
                        "inverse-on-surface": "#2e3037",
                        "on-secondary": "#003915",
                        "on-primary-fixed": "#00174b",
                        "surface-tint": "#b4c5ff",
                        "on-secondary-container": "#004119",
                        "secondary": "#4ae176",
                        "inverse-primary": "#0053db",
                        "surface-variant": "#33343b",
                        "on-tertiary-fixed": "#410004",
                        "primary-container": "#2563eb",
                        "surface": "#111319",
                        "on-surface": "#e2e2eb",
                        "inverse-surface": "#e2e2eb",
                        "primary": "#b4c5ff",
                        "secondary-fixed": "#6bff8f",
                        "on-background": "#e2e2eb",
                        "surface-container-lowest": "#0c0e14",
                        "error": "#ffb4ab",
                        "on-primary-container": "#eeefff",
                        "on-tertiary-container": "#ffecea",
                        "on-primary": "#002a78",
                        "tertiary": "#ffb3ad",
                        "primary-fixed-dim": "#b4c5ff",
                        "background": "#111319",
                        "on-surface-variant": "#c3c6d7",
                        "on-tertiary": "#68000a",
                        "primary-fixed": "#dbe1ff",
                        "on-error": "#690005",
                        "tertiary-fixed": "#ffdad7"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Inter"],
                        "mono": ["JetBrains Mono"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(30, 31, 38, 0.7);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(67, 70, 85, 0.3);
        }
        .scientific-input {
            background: #0c0e14;
            border-bottom: 1px solid rgba(37, 99, 235, 0.5);
        }
        .scientific-input:focus {
            border-bottom-color: #2563eb;
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.2);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased overflow-hidden">
<!-- Dashboard Background (Mockup) -->
<div class="fixed inset-0 z-0 grid grid-cols-12 gap-0">
<!-- SideNav Mockup -->
<aside class="col-span-2 bg-surface-dim border-r border-outline-variant/10 p-6 flex flex-col gap-8">
<div class="text-primary font-mono font-bold text-xl tracking-tighter uppercase">CalcIng</div>
<nav class="flex flex-col gap-2">
<div class="h-8 w-full bg-surface-container-high rounded opacity-20"></div>
<div class="h-8 w-full bg-surface-container-high rounded opacity-20"></div>
<div class="h-8 w-full bg-surface-container-high rounded opacity-20"></div>
</nav>
</aside>
<!-- Main Content Mockup -->
<main class="col-span-10 p-8 space-y-8">
<header class="flex justify-between items-center">
<div class="h-10 w-48 bg-surface-container-low rounded opacity-20"></div>
<div class="h-10 w-10 bg-surface-container-low rounded-full opacity-20"></div>
</header>
<div class="grid grid-cols-3 gap-6">
<div class="h-64 bg-surface-container-low rounded-xl opacity-20"></div>
<div class="h-64 bg-surface-container-low rounded-xl opacity-20"></div>
<div class="h-64 bg-surface-container-low rounded-xl opacity-20"></div>
</div>
<div class="h-96 bg-surface-container-low rounded-xl opacity-20"></div>
</main>
</div>
<!-- Auth Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-surface-container-lowest/60 backdrop-blur-md">
<!-- Modal Container -->
<div class="w-full max-w-[420px] glass-panel rounded-xl shadow-2xl relative overflow-hidden flex flex-col">
<!-- Close Button -->
<button class="absolute top-4 right-4 text-on-surface-variant hover:text-on-surface transition-colors p-1">
<span class="material-symbols-outlined text-xl">close</span>
</button>
<!-- Modal Header -->
<div class="pt-10 pb-6 px-8 flex flex-col items-center gap-2">
<div class="text-primary font-mono font-bold text-2xl tracking-tighter uppercase mb-4">CalcIng</div>
<div class="flex w-full bg-surface-container-lowest p-1 rounded-lg">
<button class="flex-1 py-2 text-sm font-semibold text-on-primary bg-primary-container rounded-md transition-all">
                        Iniciar sesión
                    </button>
<button class="flex-1 py-2 text-sm font-medium text-on-surface-variant hover:text-on-surface transition-all">
                        Registrarse
                    </button>
</div>
</div>
<!-- Modal Body / Form -->
<div class="px-8 pb-10 flex flex-col gap-6">
<!-- Form Group: Email -->
<div class="flex flex-col gap-1.5">
<label class="text-[10px] uppercase tracking-widest font-bold text-on-surface-variant ml-1">Dirección de correo</label>
<div class="relative group">
<input class="w-full scientific-input border-none px-4 py-3 text-sm font-mono text-on-surface focus:ring-0 rounded-t-sm transition-all outline-none" placeholder="nombre@ejemplo.com" type="email" value="admin@calcing.io"/>
</div>
</div>
<!-- Form Group: Password -->
<div class="flex flex-col gap-1.5">
<div class="flex justify-between items-center px-1">
<label class="text-[10px] uppercase tracking-widest font-bold text-on-surface-variant">Contraseña</label>
<a class="text-[10px] uppercase tracking-widest font-bold text-primary hover:text-primary-fixed transition-colors" href="#">¿Olvidaste tu contraseña?</a>
</div>
<div class="relative group">
<input class="w-full scientific-input border-none px-4 py-3 text-sm font-mono text-on-surface focus:ring-0 rounded-t-sm transition-all outline-none" placeholder="••••••••" type="password" value="********"/>
</div>
<!-- Error Message -->
<div class="flex items-center gap-2 mt-1 px-1 text-[#ef4444]">
<span class="material-symbols-outlined text-base">error</span>
<span class="text-xs font-medium">Credenciales incorrectas</span>
</div>
</div>
<!-- Primary CTA -->
<button class="w-full py-4 bg-primary-container hover:bg-inverse-primary text-white font-bold rounded-lg transition-all active:scale-[0.98] shadow-[0_4px_20px_rgba(37,99,235,0.3)] mt-2">
                    ACCEDER AL TERMINAL
                </button>
<!-- Alternative Action -->
<div class="text-center">
<p class="text-xs text-on-surface-variant">
                        ¿No tienes una cuenta? 
                        <a class="text-primary font-bold hover:underline decoration-2 underline-offset-4 ml-1" href="#">Crear cuenta</a>
</p>
</div>
</div>
<!-- Footer Decoration -->
<div class="h-1 w-full bg-gradient-to-r from-transparent via-primary-container to-transparent opacity-30"></div>
</div>
</div>
<!-- Background Decoration: Light Leaks -->
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px] pointer-events-none z-0"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[30%] h-[30%] bg-secondary/5 rounded-full blur-[100px] pointer-events-none z-0"></div>
</body></html>
