<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-highest": "#33343b",
              "outline-variant": "#434655",
              "on-tertiary-fixed-variant": "#930013",
              "on-secondary-fixed": "#002109",
              "secondary-fixed-dim": "#4ae176",
              "surface-container-low": "#191b22",
              "on-primary-fixed-variant": "#003ea8",
              "outline": "#8d90a0",
              "secondary-container": "#00b954",
              "surface-container": "#1e1f26",
              "on-error-container": "#ffdad6",
              "on-secondary-fixed-variant": "#005321",
              "surface-dim": "#111319",
              "surface-bright": "#373940",
              "error-container": "#93000a",
              "tertiary-fixed-dim": "#ffb3ad",
              "surface-container-high": "#282a30",
              "tertiary-container": "#cf2c30",
              "inverse-on-surface": "#2e3037",
              "on-secondary": "#003915",
              "on-primary-fixed": "#00174b",
              "surface-tint": "#b4c5ff",
              "on-secondary-container": "#004119",
              "secondary": "#4ae176",
              "inverse-primary": "#0053db",
              "surface-variant": "#33343b",
              "on-tertiary-fixed": "#410004",
              "primary-container": "#2563eb",
              "surface": "#111319",
              "on-surface": "#e2e2eb",
              "inverse-surface": "#e2e2eb",
              "primary": "#b4c5ff",
              "secondary-fixed": "#6bff8f",
              "on-background": "#e2e2eb",
              "surface-container-lowest": "#0c0e14",
              "error": "#ffb4ab",
              "on-primary-container": "#eeefff",
              "on-tertiary-container": "#ffecea",
              "on-primary": "#002a78",
              "tertiary": "#ffb3ad",
              "primary-fixed-dim": "#b4c5ff",
              "background": "#111319",
              "on-surface-variant": "#c3c6d7",
              "on-tertiary": "#68000a",
              "primary-fixed": "#dbe1ff",
              "on-error": "#690005",
              "tertiary-fixed": "#ffdad7"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Inter"],
              "label": ["Inter"],
              "mono": ["JetBrains Mono"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #0f1117;
            color: #e2e2eb;
            font-family: 'Inter', sans-serif;
        }
        .math-mono {
            font-family: 'JetBrains Mono', monospace;
        }
        .keypad-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen">
<!-- TopAppBar Shell -->
<header class="fixed top-0 z-50 flex justify-between items-center w-full px-6 h-16 bg-[#111319] border-b border-blue-900/15">
<div class="flex items-center gap-2">
<span class="text-xl font-mono font-bold text-[#b4c5ff] uppercase tracking-tighter">CalcIng</span>
</div>
<div class="flex items-center gap-4">
<button class="p-2 text-slate-400 hover:text-slate-200 transition-colors">
<span class="material-symbols-outlined" data-icon="help_outline">help_outline</span>
</button>
<button class="p-2 text-[#b4c5ff] border border-[#2563eb]/30 rounded-lg flex items-center gap-2 px-3 py-1.5 active:scale-95 transition-transform duration-75">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
<span class="font-['Space_Grotesk'] text-sm font-bold uppercase tracking-tight">Acceso</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-16 pb-24 px-4 max-w-md mx-auto w-full flex flex-col gap-4">
<!-- Calculator Display Section -->
<section class="mt-4 p-6 bg-surface-container-lowest rounded-xl flex flex-col justify-end items-end gap-2 h-44 border-b border-blue-900/15">
<div class="math-mono text-on-surface-variant text-lg tracking-tight opacity-70">
                sin(π/4) * √(128) / log(10)
            </div>
<div class="math-mono text-secondary text-4xl font-bold tracking-tighter">
                = 8.0000
            </div>
</section>
<!-- Tool Bar / Toggle Section -->
<div class="flex justify-between items-center px-1">
<div class="flex bg-surface-container-high p-1 rounded-full border border-outline-variant/10">
<button class="px-4 py-1.5 rounded-full text-xs font-bold font-['Space_Grotesk'] bg-primary-container text-white shadow-lg">DEG</button>
<button class="px-4 py-1.5 rounded-full text-xs font-bold font-['Space_Grotesk'] text-on-surface-variant">RAD</button>
</div>
<div class="flex gap-2">
<button class="p-2 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="history">history</span>
</button>
<button class="p-2 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="backspace">backspace</span>
</button>
</div>
</div>
<!-- Keypad Area -->
<section class="keypad-grid flex-grow pb-4">
<!-- Row 1: Scientific Functions -->
<button class="h-14 rounded-xl bg-surface-container-high text-primary font-['Space_Grotesk'] font-bold text-sm uppercase tracking-wider active:scale-95 duration-150">sin</button>
<button class="h-14 rounded-xl bg-surface-container-high text-primary font-['Space_Grotesk'] font-bold text-sm uppercase tracking-wider active:scale-95 duration-150">cos</button>
<button class="h-14 rounded-xl bg-surface-container-high text-primary font-['Space_Grotesk'] font-bold text-sm uppercase tracking-wider active:scale-95 duration-150">tan</button>
<button class="h-14 rounded-xl bg-surface-container-high text-tertiary font-['Space_Grotesk'] font-bold text-sm uppercase tracking-wider active:scale-95 duration-150">clr</button>
<!-- Row 2: Sci-2 -->
<button class="h-14 rounded-xl bg-surface-container-high text-primary font-bold active:scale-95 duration-150"><span class="math-mono">√</span></button>
<button class="h-14 rounded-xl bg-surface-container-high text-primary font-bold active:scale-95 duration-150"><span class="math-mono">x²</span></button>
<button class="h-14 rounded-xl bg-surface-container-high text-primary font-bold active:scale-95 duration-150"><span class="math-mono">log</span></button>
<button class="h-14 rounded-xl bg-surface-container-high text-primary-fixed-dim text-2xl active:scale-95 duration-150">÷</button>
<!-- Row 3: Numbers & Operators -->
<button class="h-16 rounded-xl bg-surface-container text-on-surface text-2xl font-mono active:scale-95 duration-150">7</button>
<button class="h-16 rounded-xl bg-surface-container text-on-surface text-2xl font-mono active:scale-95 duration-150">8</button>
<button class="h-16 rounded-xl bg-surface-container text-on-surface text-2xl font-mono active:scale-95 duration-150">9</button>
<button class="h-16 rounded-xl bg-surface-container-high text-primary-fixed-dim text-2xl active:scale-95 duration-150">×</button>
<!-- Row 4 -->
<button class="h-16 rounded-xl bg-surface-container text-on-surface text-2xl font-mono active:scale-95 duration-150">4</button>
<button class="h-16 rounded-xl bg-surface-container text-on-surface text-2xl font-mono active:scale-95 duration-150">5</button>
<button class="h-16 rounded-xl bg-surface-container text-on-surface text-2xl font-mono active:scale-95 duration-150">6</button>
<button class="h-16 rounded-xl bg-surface-container-high text-primary-fixed-dim text-2xl active:scale-95 duration-150">−</button>
<!-- Row 5 -->
<button class="h-16 rounded-xl bg-surface-container text-on-surface text-2xl font-mono active:scale-95 duration-150">1</button>
<button class="h-16 rounded-xl bg-surface-container text-on-surface text-2xl font-mono active:scale-95 duration-150">2</button>
<button class="h-16 rounded-xl bg-surface-container text-on-surface text-2xl font-mono active:scale-95 duration-150">3</button>
<button class="h-16 rounded-xl bg-surface-container-high text-primary-fixed-dim text-2xl active:scale-95 duration-150">+</button>
<!-- Row 6 -->
<button class="h-16 rounded-xl bg-surface-container text-on-surface text-2xl font-mono active:scale-95 duration-150">0</button>
<button class="h-16 rounded-xl bg-surface-container text-on-surface text-2xl font-mono active:scale-95 duration-150">.</button>
<button class="h-16 rounded-xl bg-surface-container text-on-surface text-2xl font-mono active:scale-95 duration-150"><span class="math-mono">π</span></button>
<button class="h-16 rounded-xl bg-primary-container text-white text-2xl shadow-[0_0_15px_rgba(37,99,235,0.4)] active:scale-90 duration-150">=</button>
</section>
</main>
<!-- BottomNavBar Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 md:hidden bg-[#111319]/90 backdrop-blur-xl border-t border-blue-900/30 shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
<!-- Item 1: Active (Calculadora) -->
<a class="flex flex-col items-center justify-center bg-[#2563eb] text-white rounded-xl p-2 scale-110 shadow-[0_0_15px_rgba(37,99,235,0.4)] active:scale-90 duration-150 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="calculate">calculate</span>
<span class="font-['Space_Grotesk'] text-[10px] font-bold uppercase mt-1">Calc</span>
</a>
<!-- Item 2: Graph -->
<a class="flex flex-col items-center justify-center text-slate-500 p-2 active:bg-blue-800 transition-all duration-150" href="#">
<span class="material-symbols-outlined" data-icon="query_stats">query_stats</span>
<span class="font-['Space_Grotesk'] text-[10px] font-bold uppercase mt-1">Graph</span>
</a>
<!-- Item 3: CAS -->
<a class="flex flex-col items-center justify-center text-slate-500 p-2 active:bg-blue-800 transition-all duration-150" href="#">
<span class="material-symbols-outlined" data-icon="auto_fix_high">auto_fix_high</span>
<span class="font-['Space_Grotesk'] text-[10px] font-bold uppercase mt-1">CAS</span>
</a>
<!-- Item 4: Docs / Advanced -->
<a class="flex flex-col items-center justify-center text-slate-500 p-2 active:bg-blue-800 transition-all duration-150" href="#">
<span class="material-symbols-outlined" data-icon="menu_book">menu_book</span>
<span class="font-['Space_Grotesk'] text-[10px] font-bold uppercase mt-1">Docs</span>
</a>
</nav>
</body></html>
